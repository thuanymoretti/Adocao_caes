<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário De Adoção</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1> -Formulário de Adoção- </h1>

    <form id="formAdocao">
        <label for="nome">Nome:</label>
        <input type="text" id="nome"  placeholder="Digite seu nome completo...">
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite seu email...">
        <br>

        <label for="telefone">Telefone:</label>
        <input type="telefone" id="telefone" placeholder="Digite seu telefone...">
        <br>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" placeholder="Digite seu CPF...">
        <br>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" placeholder="Digite sua idade...">
        <br>

        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Informe sua cidade...">
        <br>

        <label for="moradia">Moradia:</label>
        <select name="moradia" id="moradia">
            <option value="">Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>
        <br>

        <label for="quintal">Possui Quintal?</label>
        <input type="radio" name="quintal" value="sim">Sim
        <input type="radio" name="quintal" value="nao">Não
        <br>

        <label for="pets">Já teve pets antes?</label>
        <input type="radio" name="pets" value="sim">Sim
        <input type="radio" name="pets" value="nao">Não
        <br>

        <label for="tempo">Quantas horas o animal ficará sozinho por dia:</label>
        <input type="number" id="tempo" placeholder="Informe um valor numérico...s">
        <br>


        <label for="motivo">Motivo da adoção:</label><br>
        <textarea id="motivo" name="motivo" rows="4" cols="40" placeholder="Explique por que deseja adotar..."></textarea>
        <br>

        <label>
            <input type="checkbox" id="termo">
            Aceito o termo de responsabilidade
        </label>
        <br>

        </select>
        <br>

        <button type="submit">Enviar</button>
    </form>

    <div id="resultado"></div>

    <script src="scripts/script.js"></script>

</body>

</html>
